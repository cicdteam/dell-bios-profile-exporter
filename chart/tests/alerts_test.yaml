suite: alert rules
templates:
  - templates/prometheusrule.yaml
  - templates/vmrule.yaml
tests:
  # No capabilities.apiVersions here on purpose: rendering must follow
  # monitoring.stack / alerts.enabled, not cluster API discovery.
  - it: renders three Prometheus alerts by default
    template: templates/prometheusrule.yaml
    asserts:
      - isKind:
          of: PrometheusRule
      - lengthEqual:
          path: spec.groups[0].rules
          count: 3
  - it: drops drift rule when disabled
    set:
      alerts.rules.drift.enabled: false
    template: templates/prometheusrule.yaml
    asserts:
      - lengthEqual:
          path: spec.groups[0].rules
          count: 2
  - it: renders no PrometheusRule when alerts disabled
    set:
      alerts.enabled: false
    template: templates/prometheusrule.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: renders VMRule for victoriametrics
    set:
      monitoring.stack: victoriametrics
    template: templates/vmrule.yaml
    asserts:
      - isKind:
          of: VMRule

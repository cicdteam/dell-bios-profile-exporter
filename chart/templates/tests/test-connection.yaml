{{- if eq .Values.monitoring.scrapeType "service" }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "dell-bios.fullname" . }}-test-connection
  labels:
    {{- include "dell-bios.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["/bin/sh", "-c"]
      args:
        - >
          curl -sf http://{{ include "dell-bios.fullname" . }}:{{ .Values.service.port }}/metrics
          | grep -q dell_bios_exporter_build_info
{{- end }}

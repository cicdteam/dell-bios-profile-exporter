name: release

# Triggered by a semver tag. Tag only a green main: this workflow publishes
# artifacts and does not re-run the full test suite (that is ci.yml's job).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      packages: write   # push image and chart to ghcr.io
    env:
      IMAGE: ghcr.io/cicdteam/dell-bios-profile-exporter
      CHART_REGISTRY: oci://ghcr.io/cicdteam/charts
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---- container image ----
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: exporter
          file: exporter/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}

      # ---- helm chart (OCI) ----
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Package and push chart
        run: |
          helm package chart/ \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination "$RUNNER_TEMP"
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "$RUNNER_TEMP/dell-bios-profile-exporter-${{ steps.ver.outputs.version }}.tgz" "${CHART_REGISTRY}"

      # ---- github release ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

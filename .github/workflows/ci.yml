name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which component changed so we only run the relevant jobs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'exporter/**'
              - '.github/workflows/ci.yml'
            chart:
              - 'chart/**'
              - 'examples/**'
              - 'scripts/verify.sh'
              - '.github/workflows/ci.yml'

  # Go exporter: mirrors the local `make` targets so CI == developer machine.
  go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exporter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: exporter/go.mod
          cache-dependency-path: exporter/go.sum
      - name: Check formatting (make fmt)
        run: |
          make fmt
          git diff --exit-code || { echo "::error::Code is not formatted, run 'make fmt'"; exit 1; }
      - name: Vet
        run: make vet
      - name: Lint
        run: make lint
      - name: Vulnerabilities
        run: make vuln
      - name: Test
        run: make test
      - name: Build
        run: make build

  # Build the image on PRs without pushing, to catch Dockerfile breakage early.
  image:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: exporter
          file: exporter/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VERSION=ci-${{ github.sha }}

  # Helm chart: runs scripts/verify.sh, which covers lint/template/kubeconform
  # /unittest against both Helm 3 and Helm 4.
  chart:
    needs: changes
    if: ${{ needs.changes.outputs.chart == 'true' }}
    runs-on: ubuntu-latest
    env:
      HELM4_VERSION: v4.2.0
      HELM3_VERSION: v3.17.3
      KUBECONFORM_VERSION: v0.6.7
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm 4 as `helm`
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM4_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
      - name: Install Helm 3 as ~/bin/helm3 (isolated plugin home)
        run: |
          mkdir -p "$HOME/bin" /tmp/h3 "$HOME/.helm3-plugins"
          curl -fsSL "https://get.helm.sh/helm-${HELM3_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp/h3
          mv /tmp/h3/linux-amd64/helm "$HOME/bin/helm3.real"
          # Point Helm 3 at an empty plugin dir so it does not try to load the
          # Helm 4-format helm-unittest plugin (it warns on the platformHooks field).
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'export HELM_PLUGINS="$HOME/.helm3-plugins"' \
            'exec "$HOME/bin/helm3.real" "$@"' > "$HOME/bin/helm3"
          chmod +x "$HOME/bin/helm3"
      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false
      - name: Verify chart
        run: ./scripts/verify.sh
